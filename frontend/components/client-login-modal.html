<!-- components/client-login-modal.html -->
<div id="clientModal" class="modal-overlay">
    <div class="modal-content">
        <button class="modal-close" id="closeClientModal">&times;</button>
        
        <!-- Форма входа -->
        <div id="clientLoginForm">
            <h2 style="color: #5D4A36; margin-bottom: 20px; text-align: center;">👤 Вход для клиентов</h2>
            
            <div class="form-group">
                <label>Телефон *</label>
                <input type="tel" id="clientPhoneLogin" class="client-input" placeholder="+7 912 345 67 89" autocomplete="off">
                <small>Пример: +7 912 345 67 89</small>
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" id="clientPasswordLogin" class="client-input" placeholder="Введите пароль">
            </div>
            
            <button id="submitClientLogin" class="client-submit-btn">Войти</button>
            
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="showRegisterBtn" style="color:#8B7355; text-decoration:none;">📝 Нет аккаунта? Зарегистрироваться</a>
            </div>
            
            <div id="loginError" style="color:#f44336; text-align:center; margin-top:15px; display:none; font-size:0.85rem;"></div>
        </div>
        
        <!-- Форма регистрации -->
        <div id="clientRegisterForm" style="display: none;">
            <h2 style="color: #5D4A36; margin-bottom: 20px; text-align: center;">📝 Регистрация</h2>
            
            <div class="form-group">
                <label>Ваше имя *</label>
                <input type="text" id="registerName" class="client-input" placeholder="Иван Иванов" autocomplete="off">
                <small>Только буквы, пробелы и дефисы (2-50 символов)</small>
            </div>
            <div class="form-group">
                <label>Телефон *</label>
                <input type="tel" id="registerPhone" class="client-input" placeholder="+7 912 345 67 89" autocomplete="off">
                <small>Пример: +7 912 345 67 89 (11 цифр после +7)</small>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" class="client-input" placeholder="ivan@example.com" autocomplete="off">
                <small>Необязательно, но рекомендуется</small>
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" id="registerPassword" class="client-input" placeholder="Придумайте пароль">
                <small>От 4 до 50 символов</small>
            </div>
            
            <button id="submitRegister" class="client-submit-btn">Зарегистрироваться</button>
            
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="showLoginBtn" style="color:#8B7355; text-decoration:none;">🔙 Уже есть аккаунт? Войти</a>
            </div>
            
            <div id="registerError" style="color:#f44336; text-align:center; margin-top:15px; display:none; font-size:0.85rem;"></div>
        </div>
    </div>
</div>

<style>
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 10000;
    justify-content: center;
    align-items: center;
}
.modal-overlay.active {
    display: flex;
}
.modal-content {
    background: white;
    border-radius: 30px;
    padding: 35px;
    width: 90%;
    max-width: 450px;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.modal-close {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    color: #999;
}
.modal-close:hover {
    color: #333;
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #333;
}
.client-input {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e8e0d5;
    border-radius: 12px;
    font-size: 1rem;
    box-sizing: border-box;
    transition: border-color 0.3s;
}
.client-input:focus {
    outline: none;
    border-color: #8B7355;
}
.client-input.error {
    border-color: #f44336;
    background-color: #ffeeee;
}
.client-submit-btn {
    width: 100%;
    padding: 14px;
    background: #5D4A36;
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s;
}
.client-submit-btn:hover {
    background: #8B7355;
    transform: translateY(-2px);
}
.client-submit-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
}
small {
    display: block;
    font-size: 0.7rem;
    color: #999;
    margin-top: 5px;
}
.error-border {
    border-color: #f44336 !important;
}
</style>

<script>
(function() {
    console.log('🔧 Инициализация модалки клиентов с проверками');
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    
    function showError(element, message) {
        if (element) {
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => {
                if (element) element.style.display = 'none';
            }, 5000);
        }
    }
    
    function validateName(name) {
        if (!name || typeof name !== 'string') return false;
        const trimmed = name.trim();
        // Только буквы (русские/английские), пробелы, дефисы, от 2 до 50
        const nameRegex = /^[A-Za-zА-Яа-яЁё\s\-]{2,50}$/;
        return nameRegex.test(trimmed);
    }
    
    // Извлечь 11 цифр из телефона для отправки на сервер
    function getCleanPhone(phone) {
        const digits = phone.replace(/\D/g, '');
        if (digits.length === 11 && digits.startsWith('7')) {
            return digits;
        }
        return digits;
    }
    
    function validateEmail(email) {
        if (!email || email.trim() === '') return true;
        const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        return emailRegex.test(email.trim());
    }
    
    function validatePassword(password) {
        if (!password || typeof password !== 'string') return false;
        const len = password.trim().length;
        return len >= 4 && len <= 50;
    }
    
    function highlightError(input) {
        if (input) {
            input.classList.add('error-border');
            setTimeout(() => {
                if (input) input.classList.remove('error-border');
            }, 2000);
        }
    }
    
    // ========== ПОЛУЧЕНИЕ ЭЛЕМЕНТОВ ==========
    const modal = document.getElementById('clientModal');
    const closeBtn = document.getElementById('closeClientModal');
    const loginForm = document.getElementById('clientLoginForm');
    const registerForm = document.getElementById('clientRegisterForm');
    const showRegisterBtn = document.getElementById('showRegisterBtn');
    const showLoginBtn = document.getElementById('showLoginBtn');
    const submitLogin = document.getElementById('submitClientLogin');
    const submitRegister = document.getElementById('submitRegister');
    const loginError = document.getElementById('loginError');
    const registerError = document.getElementById('registerError');
    
    // ========== ПЕРЕКЛЮЧЕНИЕ ФОРМ ==========
    if (showRegisterBtn && loginForm && registerForm) {
        showRegisterBtn.onclick = function(e) {
            e.preventDefault();
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            if (registerError) registerError.style.display = 'none';
        };
    }
    
    if (showLoginBtn && loginForm && registerForm) {
        showLoginBtn.onclick = function(e) {
            e.preventDefault();
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            if (loginError) loginError.style.display = 'none';
        };
    }
    
    // ========== ЗАКРЫТИЕ МОДАЛКИ ==========
    if (closeBtn) {
        closeBtn.onclick = function() {
            if (modal) modal.classList.remove('active');
        };
    }
    
    if (modal) {
        modal.onclick = function(e) {
            if (e.target === modal) modal.classList.remove('active');
        };
    }
    
    // ========== КНОПКА ВХОДА В ШАПКЕ ==========
    const headerLoginBtn = document.getElementById('headerLoginBtn');
    if (headerLoginBtn) {
        headerLoginBtn.onclick = function(e) {
            e.preventDefault();
            if (modal) {
                modal.classList.add('active');
                if (loginForm) loginForm.style.display = 'block';
                if (registerForm) registerForm.style.display = 'none';
                if (loginError) loginError.style.display = 'none';
                const phoneInput = document.getElementById('clientPhoneLogin');
                const passInput = document.getElementById('clientPasswordLogin');
                if (phoneInput) phoneInput.value = '';
                if (passInput) passInput.value = '';
            }
        };
    }
    
    // ========== ВХОД ==========
    if (submitLogin) {
        submitLogin.onclick = async function() {
            let phone = document.getElementById('clientPhoneLogin')?.value.trim();
            const password = document.getElementById('clientPasswordLogin')?.value;
            
            if (!phone) {
                showError(loginError, '❌ Введите телефон');
                highlightError(document.getElementById('clientPhoneLogin'));
                return;
            }
            if (!password) {
                showError(loginError, '❌ Введите пароль');
                highlightError(document.getElementById('clientPasswordLogin'));
                return;
            }
            
            const cleanPhone = getCleanPhone(phone);
            
            if (cleanPhone.length !== 11) {
                showError(loginError, '❌ Телефон должен содержать 11 цифр (например: 79123456789)');
                highlightError(document.getElementById('clientPhoneLogin'));
                return;
            }
            
            this.disabled = true;
            this.textContent = 'Вход...';
            if (loginError) loginError.style.display = 'none';
            
            try {
                const res = await fetch('/api/auth/client-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: cleanPhone, password })
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('client', JSON.stringify(data.user));
                    alert(`Добро пожаловать, ${data.user.name || data.user.full_name}!`);
                    if (modal) modal.classList.remove('active');
                    
                    if (typeof window.updateCabinetButton === 'function') {
                        window.updateCabinetButton();
                    }
                    if (typeof window.updateHeaderButton === 'function') {
                        window.updateHeaderButton();
                    }
                    
                    window.location.reload();
                } else {
                    showError(loginError, data.error || '❌ Неверный телефон или пароль');
                }
            } catch(e) {
                showError(loginError, '❌ Ошибка соединения с сервером');
                console.error(e);
            } finally {
                this.disabled = false;
                this.textContent = 'Войти';
            }
        };
    }
    
    // ========== РЕГИСТРАЦИЯ (без подтверждения пароля) ==========
    if (submitRegister) {
        submitRegister.onclick = async function() {
            const name = document.getElementById('registerName')?.value.trim();
            let phone = document.getElementById('registerPhone')?.value.trim();
            const email = document.getElementById('registerEmail')?.value.trim();
            const password = document.getElementById('registerPassword')?.value;
            
            console.log('Регистрация:', { name, phone, email, passwordLength: password?.length });
            
            // 1. Имя
            if (!validateName(name)) {
                showError(registerError, '❌ Имя должно содержать только буквы (2-50 символов)');
                highlightError(document.getElementById('registerName'));
                return;
            }
            
            // 2. Телефон
            const cleanPhone = getCleanPhone(phone);
            
            if (cleanPhone.length !== 11) {
                showError(registerError, `❌ Телефон должен содержать 11 цифр (например: 79123456789). Сейчас: ${cleanPhone.length} цифр`);
                highlightError(document.getElementById('registerPhone'));
                return;
            }
            
            if (!cleanPhone.startsWith('7')) {
                showError(registerError, '❌ Телефон должен начинаться с 7 (например: 79123456789)');
                highlightError(document.getElementById('registerPhone'));
                return;
            }
            
            // 3. Email (если указан)
            if (email && !validateEmail(email)) {
                showError(registerError, '❌ Введите корректный email (например: name@domain.ru)');
                highlightError(document.getElementById('registerEmail'));
                return;
            }
            
            // 4. Пароль
            if (!validatePassword(password)) {
                const len = password ? password.length : 0;
                showError(registerError, `❌ Пароль должен быть от 4 до 50 символов. Сейчас: ${len}`);
                highlightError(document.getElementById('registerPassword'));
                return;
            }
            
            this.disabled = true;
            this.textContent = 'Регистрация...';
            if (registerError) registerError.style.display = 'none';
            
            try {
                const res = await fetch('/api/auth/client-register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        full_name: name, 
                        phone: cleanPhone,
                        email: email || '', 
                        password: password 
                    })
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    alert('✅ Регистрация успешна! Теперь войдите.');
                    if (loginForm) loginForm.style.display = 'block';
                    if (registerForm) registerForm.style.display = 'none';
                    
                    const phoneInput = document.getElementById('clientPhoneLogin');
                    if (phoneInput) {
                        phoneInput.value = '+7' + cleanPhone.slice(1);
                    }
                    
                    // Очищаем поля
                    const nameInput = document.getElementById('registerName');
                    const phoneInputReg = document.getElementById('registerPhone');
                    const emailInput = document.getElementById('registerEmail');
                    const passInput = document.getElementById('registerPassword');
                    
                    if (nameInput) nameInput.value = '';
                    if (phoneInputReg) phoneInputReg.value = '';
                    if (emailInput) emailInput.value = '';
                    if (passInput) passInput.value = '';
                    
                    if (loginError) loginError.style.display = 'none';
                } else {
                    showError(registerError, data.error || '❌ Ошибка регистрации');
                }
            } catch(e) {
                showError(registerError, '❌ Ошибка соединения с сервером');
                console.error(e);
            } finally {
                this.disabled = false;
                this.textContent = 'Зарегистрироваться';
            }
        };
    }
    
    console.log('✅ Модалка клиентов готова, поле подтверждения пароля удалено');
})();
</script>
