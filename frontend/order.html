<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заявки | Чистый дом</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .order-page { padding-top: 100px; padding-bottom: 80px; background: linear-gradient(135deg, #f8f9fa 0%, #f0e9e0 100%); min-height: 100vh; }
        .order-header { text-align: center; margin-bottom: 50px; }
        .order-header h1 { font-size: 3rem; color: #2c2c2c; margin-bottom: 1rem; position: relative; display: inline-block; }
        .order-header h1::after { content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); width: 120px; height: 4px; background: #8B7355; border-radius: 2px; }
        .order-header p { font-size: 1.2rem; color: #666; max-width: 800px; margin: 30px auto 0; }
        .order-form-container { max-width: 900px; margin: 0 auto; background: #ffffff; border-radius: 40px; padding: 50px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1); }
        .section-title { font-size: 1.8rem; color: #5D4A36; margin: 30px 0 25px 0; padding-bottom: 12px; border-bottom: 2px solid #e8e0d5; display: flex; align-items: center; gap: 12px; }
        .section-title:first-of-type { margin-top: 0; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.95rem; font-weight: 500; color: #3a3a3a; margin-bottom: 8px; }
        .form-group label .required { color: #cc0000; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 18px; border: 2px solid #e8e0d5; border-radius: 16px; font-size: 1rem; font-family: 'Inter', sans-serif; background: #fefcf9; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #8B7355; }
        .row-two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .selected-services-list { background: #f8f5f0; border-radius: 20px; padding: 20px; margin: 20px 0; }
        .selected-service-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e8e0d5; }
        .selected-service-item:last-child { border-bottom: none; }
        .total-block { background: linear-gradient(135deg, #5D4A36, #8B7355); border-radius: 20px; padding: 20px 30px; margin: 30px 0; text-align: center; color: white; }
        .total-block .price { font-size: 2.5rem; font-weight: 700; margin-left: 20px; color: #FFE74A; }
        .submit-btn { width: 100%; background: #5D4A36; color: white; border: none; padding: 18px; font-size: 1.2rem; font-weight: 600; border-radius: 50px; cursor: pointer; transition: all 0.3s; margin-top: 30px; }
        .submit-btn:hover { background: #8B7355; transform: translateY(-2px); }
        .search-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-input { flex: 1; padding: 12px 16px; border: 2px solid #e8e0d5; border-radius: 30px; font-size: 1rem; }
        .search-btn { padding: 12px 24px; background: #5D4A36; color: white; border: none; border-radius: 30px; cursor: pointer; }
        #map { height: 300px; border-radius: 20px; margin-bottom: 20px; z-index: 1; }
        @media (max-width: 768px) {
            .order-page { padding-top: 80px; }
            .order-header h1 { font-size: 2rem; }
            .order-form-container { padding: 30px 20px; }
            .row-two { grid-template-columns: 1fr; }
            .total-block .price { font-size: 1.8rem; display: block; margin-left: 0; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div id="navbar-placeholder"></div>
<div id="modal-placeholder"></div>
<div id="client-modal-placeholder"></div>

<div class="order-page">
    <div class="container">
        <div class="order-header">
            <h1>Оформление заявки</h1>
            <p>Заполните форму, и наш менеджер свяжется с вами для подтверждения</p>
        </div>
        
        <div class="order-form-container">
            <div class="section-title"><span>🧹</span> Выбранные услуги</div>
            <div id="selectedServicesList" class="selected-services-list"></div>
            
            <div class="total-block">
                <span>Итого к оплате:</span>
                <span class="price" id="totalPrice">0 ₽</span>
            </div>
            
            <div class="section-title"><span>👤</span> Контактные данные</div>
            <div class="row-two">
                <div class="form-group">
                    <label>Ваше имя <span class="required">*</span></label>
                    <input type="text" id="clientName" placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label>Телефон <span class="required">*</span></label>
                    <input type="tel" id="clientPhone" placeholder="+7 (___) ___-__-__">
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="clientEmail" placeholder="ivan@example.com">
            </div>
            
            <div class="section-title"><span>📅</span> Дата и время</div>
            <div class="row-two">
                <div class="form-group">
                    <label>Дата <span class="required">*</span></label>
                    <input type="date" id="orderDate">
                </div>
                <div class="form-group">
                    <label>Время <span class="required">*</span></label>
                    <select id="orderTime">
                        <option value="09:00">09:00 - 10:00</option>
                        <option value="10:00">10:00 - 11:00</option>
                        <option value="11:00">11:00 - 12:00</option>
                        <option value="12:00">12:00 - 13:00</option>
                        <option value="13:00">13:00 - 14:00</option>
                        <option value="14:00">14:00 - 15:00</option>
                        <option value="15:00">15:00 - 16:00</option>
                        <option value="16:00">16:00 - 17:00</option>
                        <option value="17:00">17:00 - 18:00</option>
                    </select>
                </div>
            </div>
            
            <div class="section-title"><span>📍</span> Адрес уборки</div>
            <div class="search-container">
                <input type="text" id="addressSearch" class="search-input" placeholder="Введите адрес (например: Иркутск, Ленина 1)">
                <button class="search-btn" id="searchAddressBtn">🔍 Найти на карте</button>
            </div>
            <div id="map"></div>
            <div class="address-hint">💡 Введите адрес и нажмите "Найти на карте" — карта покажет точное местоположение.</div>
            
            <div class="section-title"><span>💬</span> Особые пожелания</div>
            <div class="form-group">
                <textarea id="comment" rows="4" placeholder="Укажите особые пожелания (например, гипоаллергенная химия, осторожно с антикварной мебелью и т.д.)"></textarea>
            </div>
            
            <button class="submit-btn" id="submitBtn">Отправить заявку</button>
        </div>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="components/loader.js"></script>
<script src="script.js"></script>
<script>
    let selectedServices = [];
    let totalPrice = 0;
    let map, marker;
    const irkutsk = [52.286387, 104.280663];
    
    function loadSelectedServices() {
        const savedServices = localStorage.getItem('selectedServices');
        const savedTotal = localStorage.getItem('totalPrice');
        
        if (savedServices) {
            selectedServices = JSON.parse(savedServices);
            totalPrice = parseInt(savedTotal) || 0;
            renderSelectedServices();
            document.getElementById('totalPrice').textContent = totalPrice + ' ₽';
        } else {
            window.location.href = 'prices.html';
        }
    }
    
    function renderSelectedServices() {
        const container = document.getElementById('selectedServicesList');
        if (selectedServices.length === 0) {
            container.innerHTML = '<p style="padding: 20px; text-align: center;">Нет выбранных услуг. <a href="prices.html">Выберите услуги</a></p>';
            return;
        }
        
        container.innerHTML = selectedServices.map(service => `
            <div class="selected-service-item">
                <span>${escapeHtml(service.name)}</span>
                <span style="font-weight: 600;">${service.price} ₽</span>
            </div>
        `).join('');
    }
    
    function loadClientData() {
        const client = localStorage.getItem('client');
        if (client) {
            const clientData = JSON.parse(client);
            console.log('Загружен клиент:', clientData);
            const clientName = clientData.name || clientData.full_name || '';
            document.getElementById('clientName').value = clientName;
            document.getElementById('clientPhone').value = clientData.phone || '';
            document.getElementById('clientEmail').value = clientData.email || '';
        }
    }
    
    async function submitOrder() {
        const client = localStorage.getItem('client');
        if (!client) {
            alert('Пожалуйста, войдите в аккаунт');
            window.location.href = 'index.html';
            return;
        }
        
        const clientData = JSON.parse(client);
        const name = document.getElementById('clientName').value.trim();
        const phone = document.getElementById('clientPhone').value.trim();
        const email = document.getElementById('clientEmail').value.trim();
        const date = document.getElementById('orderDate').value;
        const time = document.getElementById('orderTime').value;
        const address = document.getElementById('addressSearch').value.trim();
        const comment = document.getElementById('comment').value;
        
        if (!name) { alert('Введите ваше имя'); return; }
        if (!phone) { alert('Введите телефон'); return; }
        if (!date) { alert('Выберите дату'); return; }
        if (!address) { alert('Введите адрес'); return; }
        if (selectedServices.length === 0) { alert('Выберите услуги'); return; }
        
        const orderData = {
            client_id: clientData.id,
            client_name: name,
            client_phone: phone,
            client_email: email,
            address: address,
            order_date: date,
            time_slot: time,
            comment: comment,
            services: selectedServices,
            total_price: totalPrice
        };
        
        try {
            const response = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert('✅ Заказ успешно оформлен!');
                localStorage.removeItem('selectedServices');
                localStorage.removeItem('totalPrice');
                window.location.href = 'client-cabinet.html';
            } else {
                alert('Ошибка: ' + (result.error || 'Попробуйте позже'));
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert('Ошибка соединения с сервером');
        }
    }
    
    function initMap() {
        map = L.map('map').setView(irkutsk, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        marker = L.marker(irkutsk).addTo(map);
        
        map.on('click', async function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            marker.setLatLng([lat, lng]);
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18`);
                const data = await response.json();
                document.getElementById('addressSearch').value = data.display_name || `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            } catch(error) {
                document.getElementById('addressSearch').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            }
        });
    }
    
    async function searchAddress() {
        const query = document.getElementById('addressSearch').value.trim();
        if (!query) { alert('Введите адрес'); return; }
        
        const btn = document.getElementById('searchAddressBtn');
        btn.textContent = '⏳ Поиск...';
        btn.disabled = true;
        
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
            const data = await response.json();
            
            if (data && data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                map.setView([lat, lon], 16);
                marker.setLatLng([lat, lon]);
                document.getElementById('addressSearch').value = data[0].display_name;
            } else {
                alert('Адрес не найден');
            }
        } catch(error) {
            alert('Ошибка поиска');
        } finally {
            btn.textContent = '🔍 Найти на карте';
            btn.disabled = false;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('orderDate').min = new Date().toISOString().split('T')[0];
    document.getElementById('submitBtn').addEventListener('click', submitOrder);
    document.getElementById('searchAddressBtn').addEventListener('click', searchAddress);
    document.getElementById('addressSearch').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchAddress();
    });
    
    loadSelectedServices();
    loadClientData();
    initMap();
</script>
</body>
</html>
